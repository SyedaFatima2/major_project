<!DOCTYPE html>
<html>
<head>
    <title>Result - FanSound AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">FanSound AI</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/charts">Charts</a>
      <a class="nav-link" href="/predict">Predict</a>
      <a class="nav-link text-danger" href="/logout">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
    <h2>Prediction Result</h2>

    <div class="card mt-3 p-3">
        <h4>Prediction: <span class="text-primary">{{ label }}</span></h4>
        <p><strong>Abnormal Probability:</strong> {{ prob }}</p>
        <p><strong>Threshold Used:</strong> {{ threshold }}</p>
    </div>

    <a href="/predict" class="btn btn-success mt-3">Predict Another</a>
</div>

</body>
</html>
