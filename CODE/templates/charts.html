<!DOCTYPE html>
<html>
<head>
    <title>Charts - FanSound AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">FanSound AI</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/predict">Predict</a>
      <a class="nav-link" href="/predict">Result</a>
      <a class="nav-link text-danger" href="/logout">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
    <h2>Model Performance Charts</h2>

    <div class="row mt-4">
        {% if charts %}
            {% for img in charts %}
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <img src="/static/charts/{{ img }}" class="card-img-top">
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <p>No charts available. Please add PNG images to static/charts/ folder.</p>
        {% endif %}
    </div>
</div>

</body>
</html>
